name: CI

# Self-validation for chiseled-application-template. Runs the repo-quality
# surface every derivative chiseled image repo inherits (actionlint,
# markdownlint, workflow linting) and a placeholder for the reference image
# build that lands once the chisel cut + evidence pipeline is wired.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**/*.md"

  workflow-lint:
    name: workflow lint
    # Lints the reusable build workflow and the YAML scaffold with yamllint, on
    # top of actionlint above. The reusable workflow is the consumer-facing
    # contract, so it gets an explicit gate of its own.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install yamllint
        run: pip install --no-cache-dir yamllint==1.35.1
      - name: yamllint workflows
        run: |
          set -euo pipefail
          yamllint \
            -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, comments: disable, truthy: {check-keys: false}}}" \
            .github/workflows/

  reference-image-build:
    name: reference image build (placeholder)
    # TODO(iterate): exercise the reusable build workflow end-to-end against the
    # credential-free reference app under examples/hello/ once chisel cut + the
    # evidence pipeline are wired. This self-tests the template the same way a
    # consumer would call it. For now it is a documented placeholder so CI is
    # green and the intent is recorded.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Reference build placeholder
        run: |
          set -euo pipefail
          echo "TODO(iterate): call reusable-chiseled-image-build.yaml against examples/hello/"
          echo "and assert the image is minimal + non-root + signed with valid SBOM/provenance."
