name: Reusable Chiseled Image Build

# Type-specific reusable workflow that consumer application-image repos call by
# SHA. It builds a minimal OCI image from an Ubuntu Chiseled rootfs
# (`chisel cut`) and emits v1 supply-chain evidence: SBOM, build provenance
# attestation, cosign signature, and runtime-hardening checks.
#
# SCAFFOLD STATUS: this is a documented skeleton. The build engine and evidence
# steps are wired across follow-up iterate PRs and are marked `# TODO(iterate):`
# below. Until then each real step is a no-op placeholder that prints what it
# will do, so the workflow parses, runs green, and documents the contract.
#
# Consumers own only their app inputs (ubuntu/chisel release, slices, app
# artifact, entrypoint, image name, push/sign toggles). The build, packaging,
# and evidence pipeline lives here so every chiseled image in the fleet is built
# and proven the same way.

on:
  workflow_call:
    inputs:
      ubuntu_release:
        description: Ubuntu release the image targets, e.g. "24.04".
        required: false
        type: string
        default: "24.04"
      chisel_release:
        description: |
          Chisel release / slice-definition channel to cut from, e.g.
          "ubuntu-24.04". Selects which Ubuntu slice definitions chisel uses.
        required: false
        type: string
        default: "ubuntu-24.04"
      slices:
        description: |
          Newline-separated list of Ubuntu slices to cut into the rootfs, e.g.
          "ca-certificates_data" / "libc6_libs". These are the only packages
          that ship in the image.
        required: true
        type: string
      app_artifact:
        description: |
          Path (within the caller checkout) to the application artifact to layer
          on top of the chiseled rootfs, e.g. a statically linked binary.
        required: false
        type: string
        default: ""
      entrypoint:
        description: Absolute in-image path to set as the OCI entrypoint.
        required: false
        type: string
        default: ""
      image_name:
        description: |
          Fully-qualified image name (without tag), e.g.
          "ghcr.io/nwarila-platform/myapp".
        required: true
        type: string
      image_tag:
        description: Tag to apply to the built image. Defaults to the caller SHA.
        required: false
        type: string
        default: ""
      run_user:
        description: |
          Non-root UID the image runs as. The runtime-hardening check fails the
          build if the effective user resolves to root (0).
        required: false
        type: string
        default: "65532"
      push:
        description: Push the image to its registry after build.
        required: false
        type: boolean
        default: false
      sign:
        description: Sign the pushed image digest with cosign (keyless / OIDC).
        required: false
        type: boolean
        default: false
      emit_evidence:
        description: |
          Emit v1 supply-chain evidence (SBOM + build-provenance attestation)
          for the built image. Defaults false: the core build + reference
          self-test stay green without a pushed/registry-resolvable image. The
          follow-up evidence PR flips this on (and SBOM/attest run only when a
          real digest exists).
        required: false
        type: boolean
        default: false

    outputs:
      image_digest:
        description: |
          The built image digest (sha256:...). When inputs.push is true this is
          the registry MANIFEST digest computed on push (the subject of the
          provenance attestation and cosign signature); otherwise it is
          buildah's local image id.
        value: ${{ jobs.build.outputs.image_digest }}
      image_pinned_ref:
        description: |
          The pushed image pinned to its registry digest
          (image_name@sha256:...), empty when inputs.push is false. This is the
          exact, immutable subject that the SBOM, provenance attestation, and
          cosign signature all target.
        value: ${{ jobs.build.outputs.image_pinned_ref }}

permissions:
  contents: read

jobs:
  build:
    name: chiseled-image / build + evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # Provenance attestation + cosign keyless signing need an OIDC token.
      id-token: write
      attestations: write
      # Pushing the image to GHCR needs packages: write (gated by inputs.push).
      packages: write
    outputs:
      image_digest: ${{ steps.build_image.outputs.image_digest }}
      image_pinned_ref: ${{ steps.build_image.outputs.image_pinned_ref }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve build parameters
        id: params
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          FALLBACK_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="${IMAGE_TAG:-$FALLBACK_TAG}"
          echo "image_ref=${IMAGE_NAME}:${tag}" >> "${GITHUB_OUTPUT}"
          echo "Building image ref: ${IMAGE_NAME}:${tag}"

      - name: Install chisel (pinned)
        env:
          # renovate: datasource=github-releases depName=canonical/chisel
          CHISEL_VERSION: "1.4.1"
        run: |
          set -euo pipefail
          # Download the pinned canonical/chisel release for linux_amd64, verify
          # the tarball against its published checksum, then install onto PATH.
          # Canonical publishes a per-asset SHA384 checksum file alongside each
          # release artifact; we verify against that published digest.
          version="${CHISEL_VERSION}"
          asset="chisel_v${version}_linux_amd64.tar.gz"
          base="https://github.com/canonical/chisel/releases/download/v${version}"
          workdir="$(mktemp -d)"

          curl --proto '=https' --tlsv1.2 -fsSL --retry 3 \
            -o "${workdir}/${asset}" "${base}/${asset}"
          curl --proto '=https' --tlsv1.2 -fsSL --retry 3 \
            -o "${workdir}/${asset}.sha384" "${base}/${asset}.sha384"

          ( cd "${workdir}" && sha384sum --check --strict "${asset}.sha384" )

          install_dir="${RUNNER_TEMP}/chisel-bin"
          mkdir -p "${install_dir}"
          tar -xzf "${workdir}/${asset}" -C "${install_dir}" chisel
          chmod +x "${install_dir}/chisel"
          echo "${install_dir}" >> "${GITHUB_PATH}"

          "${install_dir}/chisel" version
          rm -rf "${workdir}"

      - name: Cut chiseled rootfs
        env:
          CHISEL_RELEASE: ${{ inputs.chisel_release }}
          SLICES: ${{ inputs.slices }}
        run: |
          set -euo pipefail
          # chisel cut fetches Canonical's slice definitions for the requested
          # release and materialises only the named slices into rootfs/.
          mkdir -p rootfs

          slice_args=()
          while IFS= read -r slice; do
            # Skip blank lines (a trailing newline in the input yields one).
            [ -n "${slice}" ] && slice_args+=("${slice}")
          done <<< "${SLICES}"

          if [ "${#slice_args[@]}" -eq 0 ]; then
            echo "::error::no slices supplied; refusing to cut an empty rootfs" >&2
            exit 1
          fi

          echo "Cutting slices into rootfs/:"
          printf '  - %s\n' "${slice_args[@]}"
          chisel cut --release "${CHISEL_RELEASE}" --root rootfs "${slice_args[@]}"

          echo "rootfs contents (top levels):"
          find rootfs -maxdepth 2 | sort

      - name: Log in to GHCR
        # Only needed when pushing. The job-scoped GITHUB_TOKEN has
        # packages: write (declared above), so it can push to any GHCR repo
        # under the workflow's owner. Gated on inputs.push so the local-only
        # reference build never touches the registry or needs credentials.
        #
        # Use `docker login` so the credential lands in ~/.docker/config.json:
        # buildah reads that file too, and (critically) so do the Node-based
        # attest-build-provenance action and cosign, which need registry
        # credentials to push the attestation referrer and the signature.
        if: ${{ inputs.push }}
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "${GHCR_TOKEN}" \
            | docker login ghcr.io --username "${GHCR_USER}" --password-stdin

      - name: Assemble OCI image
        id: build_image
        env:
          IMAGE_REF: ${{ steps.params.outputs.image_ref }}
          IMAGE_NAME: ${{ inputs.image_name }}
          APP_ARTIFACT: ${{ inputs.app_artifact }}
          ENTRYPOINT: ${{ inputs.entrypoint }}
          RUN_USER: ${{ inputs.run_user }}
          PUSH: ${{ inputs.push }}
        run: |
          set -euo pipefail
          # Build the OCI image FROM scratch over the chiseled rootfs with
          # buildah (preinstalled on ubuntu-latest). Nothing but the cut slices
          # and the optional app artifact ends up in the image.
          ctr="$(buildah from scratch)"
          buildah copy "${ctr}" rootfs /

          if [ -n "${APP_ARTIFACT}" ]; then
            if [ -z "${ENTRYPOINT}" ]; then
              echo "::error::app_artifact set but entrypoint is empty" >&2
              exit 1
            fi
            buildah copy --chmod 0755 "${ctr}" "${APP_ARTIFACT}" "${ENTRYPOINT}"
          fi

          config_args=(--user "${RUN_USER}")
          if [ -n "${ENTRYPOINT}" ]; then
            config_args+=(--entrypoint "[\"${ENTRYPOINT}\"]")
          fi
          buildah config "${config_args[@]}" "${ctr}"

          iidfile="$(mktemp)"
          buildah commit --iidfile "${iidfile}" "${ctr}" "${IMAGE_REF}"
          image_id="$(cat "${iidfile}")"
          rm -f "${iidfile}"

          # Normalise the LOCAL image id to a sha256:... reference. This is
          # buildah's local storage id, used only for local hardening inspection
          # and the dormant non-push evidence path.
          local_digest="${image_id}"
          case "${local_digest}" in
            sha256:*) ;;
            *) local_digest="sha256:${local_digest}" ;;
          esac
          echo "Built ${IMAGE_REF} (local id ${local_digest})"

          # Push is gated on inputs.push; the reference build is local-only.
          #
          # Provenance attestation + cosign sign + a registry-resolvable SBOM
          # all operate on the REGISTRY MANIFEST DIGEST, which is computed by
          # the registry on push and differs from buildah's local image id.
          # Capture it with --digestfile and surface it as the canonical
          # image_digest output so every downstream evidence step pins the same
          # immutable, registry-resolvable subject.
          if [ "${PUSH}" = "true" ]; then
            digestfile="$(mktemp)"
            buildah push --digestfile "${digestfile}" \
              "${IMAGE_REF}" "docker://${IMAGE_REF}"
            pushed_digest="$(cat "${digestfile}")"
            rm -f "${digestfile}"
            case "${pushed_digest}" in
              sha256:*) ;;
              *) pushed_digest="sha256:${pushed_digest}" ;;
            esac
            echo "Pushed ${IMAGE_REF} -> registry digest ${pushed_digest}"
            echo "image_digest=${pushed_digest}" >> "${GITHUB_OUTPUT}"
            echo "image_pinned_ref=${IMAGE_NAME}@${pushed_digest}" >> "${GITHUB_OUTPUT}"
          else
            echo "push disabled: image kept in local buildah storage only"
            # No registry digest exists; expose the local id so the dormant
            # evidence gate (emit_evidence && image_digest != '') can still key
            # off it, while attest/cosign stay gated on inputs.push.
            echo "image_digest=${local_digest}" >> "${GITHUB_OUTPUT}"
            echo "image_pinned_ref=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve SBOM target
        # The SBOM is taken of the BUILT image. When the image was pushed, point
        # syft at the registry manifest pin (image_name@<registry-digest>) so it
        # scans the exact immutable artifact that was attested and signed. When
        # evidence is requested without a push, scan the image out of buildah's
        # local containers-storage instead.
        id: sbom_target
        if: ${{ inputs.emit_evidence && steps.build_image.outputs.image_digest != '' }}
        env:
          PINNED_REF: ${{ steps.build_image.outputs.image_pinned_ref }}
          LOCAL_REF: ${{ steps.params.outputs.image_ref }}
        run: |
          set -euo pipefail
          if [ -n "${PINNED_REF}" ]; then
            echo "ref=${PINNED_REF}" >> "${GITHUB_OUTPUT}"
          else
            echo "ref=containers-storage:${LOCAL_REF}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Generate SBOM (syft)
        # Gated on inputs.emit_evidence (default false) AND a real digest. The
        # core build + reference self-test do not emit evidence, so this stays
        # dormant and the reference build stays green. This action is SHA-pinned.
        if: ${{ inputs.emit_evidence && steps.build_image.outputs.image_digest != '' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.sbom_target.outputs.ref }}
          format: spdx-json
          output-file: image.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        if: ${{ inputs.emit_evidence && steps.build_image.outputs.image_digest != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-sbom-spdx-json
          path: image.spdx.json
          if-no-files-found: error

      - name: Attest build provenance
        # Gated on inputs.emit_evidence (default false) AND a real registry
        # digest from a push. attest-build-provenance signs SLSA provenance for
        # the registry manifest digest and (push-to-registry) attaches it as an
        # OCI referrer of that digest, so it is verifiable with
        # `gh attestation verify oci://<image>@<digest>`. Requires id-token:
        # write and attestations: write (declared above). Skipped without a
        # push because there is no registry-resolvable subject to attach to.
        if: ${{ inputs.emit_evidence && inputs.push && steps.build_image.outputs.image_digest != '' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ inputs.image_name }}
          subject-digest: ${{ steps.build_image.outputs.image_digest }}
          push-to-registry: true

      - name: Install cosign (pinned)
        # Installer is SHA-pinned; Renovate manages the pin. Only runs when
        # signing a pushed image is requested.
        if: ${{ inputs.sign && inputs.push }}
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign image (cosign keyless)
        if: ${{ inputs.sign && inputs.push }}
        env:
          PINNED_REF: ${{ steps.build_image.outputs.image_pinned_ref }}
        run: |
          set -euo pipefail
          # Keyless signing over the registry manifest digest. cosign mints a
          # short-lived Fulcio cert from the Actions OIDC token (id-token: write)
          # and records the signature in the Rekor transparency log. Signing the
          # digest pin (image_name@sha256:...) - not a mutable tag - binds the
          # signature to the exact attested manifest.
          if [ -z "${PINNED_REF}" ]; then
            echo "::error::sign requested but no pushed registry digest available" >&2
            exit 1
          fi
          echo "cosign sign (keyless) ${PINNED_REF}"
          cosign sign --yes "${PINNED_REF}"

      - name: Runtime-hardening checks
        env:
          IMAGE_REF: ${{ steps.params.outputs.image_ref }}
          RUN_USER: ${{ inputs.run_user }}
        run: |
          set -euo pipefail
          # Fail the build on any hardening regression. Inspect the committed
          # image config via buildah and the chiseled rootfs via find.
          fail=0
          fail_msg() { echo "::error::$*" >&2; fail=1; }

          effective_user="$(buildah inspect --type image \
            --format '{{ .OCIv1.Config.User }}' "${IMAGE_REF}")"
          echo "effective image USER: '${effective_user}'"

          # 1) Non-root: config User must be set and resolve to a non-zero,
          #    non-root identity. Reject empty, "0", "root", and any
          #    user[:group] whose user part is 0/root.
          user_part="${effective_user%%:*}"
          case "${user_part}" in
            "" )    fail_msg "image USER is unset; refusing to default to root" ;;
            0 | root ) fail_msg "image USER resolves to root (${effective_user})" ;;
            * ) echo "OK: non-root USER (${effective_user})" ;;
          esac

          # 2) No shell in the rootfs.
          shell_hits="$(find rootfs \
            \( -path 'rootfs/bin/sh' \
            -o -path 'rootfs/bin/bash' \
            -o -path 'rootfs/usr/bin/sh' \
            -o -path 'rootfs/usr/bin/bash' \
            -o -name 'busybox' \
            -o -name 'dash' \) -print 2>/dev/null || true)"
          if [ -n "${shell_hits}" ]; then
            fail_msg "shell present in rootfs:"
            echo "${shell_hits}" >&2
          else
            echo "OK: no shell (/bin/sh, /bin/bash, busybox, dash) in rootfs"
          fi

          # 3) Distroless: no package manager in the rootfs.
          pm_hits="$(find rootfs \
            \( -name 'apt' -o -name 'apt-get' -o -name 'dpkg' \
            -o -name 'dpkg-deb' -o -name 'rpm' -o -name 'apk' \) \
            -print 2>/dev/null || true)"
          if [ -n "${pm_hits}" ]; then
            fail_msg "package manager present in rootfs:"
            echo "${pm_hits}" >&2
          else
            echo "OK: distroless (no apt/dpkg/rpm/apk) in rootfs"
          fi

          if [ "${fail}" -ne 0 ]; then
            echo "::error::runtime-hardening checks failed" >&2
            exit 1
          fi
          echo "All runtime-hardening checks passed."
