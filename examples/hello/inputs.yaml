# Reference build inputs for the `hello` example.
#
# This mirrors the input surface a consumer repo passes to
# reusable-chiseled-image-build.yaml. The template's CI self-test will feed
# these inputs once the build is wired (# TODO(iterate)).
#
# A statically linked `hello` needs almost nothing at runtime, so the slice set
# is deliberately tiny - that is the whole point of chiseling.
ubuntu_release: "24.04"
chisel_release: "ubuntu-24.04"
slices:
  # base-files provides /etc and the filesystem skeleton.
  - base-files_base
  # ca-certificates data is a common, harmless slice to prove non-trivial cuts.
  - ca-certificates_data
app_artifact: examples/hello/hello   # static binary produced by `cc -static -Os -o hello hello.c`
entrypoint: /usr/bin/hello
image_name: ghcr.io/nwarila/chiseled-hello
run_user: "65532"                    # non-root; runtime-hardening check enforces this
push: false                          # reference build is local/CI-only
sign: false                          # signing requires a pushed image
